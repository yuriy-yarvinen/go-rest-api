# Custom PostgreSQL server config, mounted into the container in place of the
# image's generated postgresql.conf (analogous to a my.cnf for MySQL).
# Any setting not listed here falls back to the server's built-in default.

listen_addresses = '*'
max_connections = 100

shared_buffers = 128MB
work_mem = 4MB

log_timezone = 'UTC'
timezone = 'UTC'
log_min_duration_statement = 200
